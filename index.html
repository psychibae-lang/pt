<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MED·RX — EMR 복용약물 변환기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --success: #2dd4a0;
    --warn: #f7c14f;
    --text: #e8eaf6;
    --text2: #8890b0;
    --danger: #f75f5f;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
    background: rgba(79,142,247,0.1);
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid rgba(79,142,247,0.3);
  }

  header .title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text2);
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: '';
    width: 3px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
    display: inline-block;
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  label {
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
  }

  input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input[type="text"]:focus { border-color: var(--accent); }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: var(--bg);
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(79,142,247,0.05);
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon { font-size: 32px; margin-bottom: 10px; }
  .upload-text { font-size: 14px; color: var(--text2); margin-bottom: 6px; }
  .upload-hint { font-size: 12px; color: var(--border); }

  .preview-img {
    max-width: 100%;
    max-height: 220px;
    border-radius: 8px;
    border: 1px solid var(--border);
    object-fit: contain;
  }

  .btn {
    padding: 11px 22px;
    border-radius: 9px;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    box-shadow: 0 4px 16px rgba(79,142,247,0.3);
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(79,142,247,0.4);
  }

  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-success {
    background: linear-gradient(135deg, var(--success), #1aab7a);
    color: white;
    box-shadow: 0 4px 16px rgba(45,212,160,0.25);
  }

  .btn-success:hover:not(:disabled) { transform: translateY(-1px); }
  .btn-success:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
  }

  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: 9px;
    font-size: 13px;
  }

  .status-loading { background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.2); color: var(--accent); }
  .status-success { background: rgba(45,212,160,0.1); border: 1px solid rgba(45,212,160,0.2); color: var(--success); }
  .status-error { background: rgba(247,95,95,0.1); border: 1px solid rgba(247,95,95,0.2); color: var(--danger); }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(79,142,247,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  th {
    background: var(--bg);
    color: var(--text2);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(46,51,80,0.5);
    color: var(--text);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(79,142,247,0.04); }

  .code-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: rgba(79,142,247,0.12);
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 5px;
    border: 1px solid rgba(79,142,247,0.2);
  }

  .method-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: rgba(124,92,252,0.12);
    color: var(--accent2);
    padding: 3px 8px;
    border-radius: 5px;
    border: 1px solid rgba(124,92,252,0.2);
  }

  .chart-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--warn);
    background: rgba(247,193,79,0.1);
    padding: 2px 8px;
    border-radius: 5px;
    border: 1px solid rgba(247,193,79,0.2);
  }

  .actions-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .result-meta { display: flex; gap: 16px; font-size: 12px; color: var(--text2); }
  .result-meta span strong { color: var(--text); font-family: 'JetBrains Mono', monospace; }

  .editable-td input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    width: 60px;
    outline: none;
    padding: 2px 4px;
    text-align: center;
  }

  .editable-td input:focus { border-bottom-color: var(--accent); }

  .hidden { display: none !important; }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text2);
    padding: 4px 6px;
    border-radius: 5px;
    font-size: 14px;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--danger); }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border-radius: 8px;
    padding: 4px;
    border: 1px solid var(--border);
    margin-bottom: 16px;
    width: fit-content;
  }

  .tab {
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
    border: none;
    background: none;
  }

  .tab.active { background: var(--surface2); color: var(--text); }

  .json-preview {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    white-space: pre;
    overflow-x: auto;
    max-height: 200px;
    overflow-y: auto;
  }

  .save-result {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
  }

  @media (max-width: 600px) {
    .input-row { flex-direction: column; }
    .actions-row { flex-direction: column; }
    .result-meta { flex-direction: column; gap: 4px; }
    .result-header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <span class="logo">MED·RX</span>
  <span class="title">EMR 복용약물 변환기</span>
</header>

<div class="container">

  <!-- STEP 1 -->
  <div class="card">
    <div class="card-title">STEP 1 &nbsp; 환자 정보 입력</div>
    <div class="input-row" style="margin-bottom:18px;">
      <div class="input-group" style="max-width:200px;">
        <label>챠트번호</label>
        <input type="text" id="chartNo" placeholder="예: 10587">
      </div>
    </div>

    <label style="margin-bottom:8px; display:block;">EMR 이미지 업로드</label>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*">
      <div id="uploadPlaceholder">
        <div class="upload-icon">📋</div>
        <div class="upload-text">EMR 약물 처방 화면을 드래그하거나 클릭해서 업로드</div>
        <div class="upload-hint">PNG · JPG · WEBP 지원</div>
      </div>
      <img id="previewImg" class="preview-img hidden">
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="card">
    <div class="card-title">STEP 2 &nbsp; AI 변환</div>
    <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
      <button class="btn btn-primary" id="convertBtn" onclick="convertImage()" disabled>
        <span>✦</span> Claude로 변환하기
      </button>
      <div id="statusBar" class="hidden"></div>
    </div>
  </div>

  <!-- STEP 3 -->
  <div class="card hidden" id="resultCard">
    <div class="card-title">STEP 3 &nbsp; 결과 확인 및 저장</div>

    <div class="tabs">
      <button class="tab active" id="tabTable" onclick="switchTab('table')">테이블 뷰</button>
      <button class="tab" id="tabJson" onclick="switchTab('json')">JSON 뷰</button>
    </div>

    <div id="tableView">
      <div class="result-header">
        <div class="result-meta">
          <span>챠트번호 <strong id="metaChart">—</strong></span>
          <span>약물 수 <strong id="metaCount">—</strong></span>
        </div>
        <div class="actions-row">
          <button class="btn btn-outline" onclick="addRow()" style="font-size:12px; padding:8px 14px;">+ 행 추가</button>
          <button class="btn btn-success" id="saveBtn" onclick="saveToSheet()">
            💾 구글시트에 저장
          </button>
        </div>
      </div>

      <div style="overflow-x:auto;">
        <table id="resultTable">
          <thead>
            <tr>
              <th>챠트번호</th>
              <th>약물코드</th>
              <th>약물명</th>
              <th>용량</th>
              <th>일투</th>
              <th>일수</th>
              <th>용법</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </div>
      <div id="saveResultBar" class="hidden save-result"></div>
    </div>

    <div id="jsonView" class="hidden">
      <pre class="json-preview" id="jsonPreview"></pre>
    </div>
  </div>

</div>

<script>
  // ── 설정 ──────────────────────────────────────────────
  const SUPABASE_PROXY = 'https://rurbfcocihvapbtdzbyt.supabase.co/functions/v1/claude-proxy';
  const SUPABASE_ANON_KEY = 'sb_publishable_YuyR-f-1MNYl94StDUP8Mw_L_35j3QN'; // ← 여기에 anon key 입력
  // 구글시트 Apps Script 웹앱 URL (다음 단계에서 입력)
  const SHEET_WEBHOOK = '';
  // ─────────────────────────────────────────────────────

  let imageBase64 = null;
  let imageMime = 'image/png';
  let drugs = [];

  document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) loadFile(file);
  });

  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadFile(file);
  });

  function loadFile(file) {
    imageMime = file.type || 'image/png';
    const reader = new FileReader();
    reader.onload = (e) => {
      imageBase64 = e.target.result.split(',')[1];
      document.getElementById('uploadPlaceholder').classList.add('hidden');
      const img = document.getElementById('previewImg');
      img.src = e.target.result;
      img.classList.remove('hidden');
      updateConvertBtn();
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('chartNo').addEventListener('input', updateConvertBtn);

  function updateConvertBtn() {
    const chartNo = document.getElementById('chartNo').value.trim();
    document.getElementById('convertBtn').disabled = !(chartNo && imageBase64);
  }

  async function convertImage() {
    const chartNo = document.getElementById('chartNo').value.trim();
    if (!chartNo || !imageBase64) return;

    setStatus('loading', 'Claude가 이미지를 분석 중입니다...');
    document.getElementById('convertBtn').disabled = true;
    document.getElementById('resultCard').classList.add('hidden');
    document.getElementById('saveResultBar').classList.add('hidden');

    const prompt = `다음은 EMR(전자의무기록) 시스템의 약물 처방 화면 캡처입니다.
이미지에서 약물 처방 테이블을 읽어 JSON 배열로 변환해주세요.

반환 형식 (JSON만, 다른 텍스트 없이):
[
  {
    "drug_code": "약물코드",
    "drug_name": "약물명",
    "dose": "용량 숫자",
    "daily_freq": "일투 숫자",
    "days": "일수 숫자",
    "method": "용법 코드 (b1, b2, b12 등)"
  }
]

반드시 JSON 배열만 반환하세요. 코드가 없으면 약물명에서 추정하고, 없으면 null 처리.`;

    try {
      const response = await fetch(SUPABASE_PROXY, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-5',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageBase64 } },
              { type: 'text', text: prompt }
            ]
          }]
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

      const text = data.content.map(i => i.text || '').join('');
      const clean = text.replace(/```json|```/g, '').trim();
      drugs = JSON.parse(clean);

      renderTable(chartNo, drugs);
      setStatus('success', `${drugs.length}개 약물 추출 완료`);
      document.getElementById('resultCard').classList.remove('hidden');

    } catch (err) {
      setStatus('error', '변환 실패: ' + err.message);
    } finally {
      document.getElementById('convertBtn').disabled = false;
      updateConvertBtn();
    }
  }

  function setStatus(type, msg) {
    const bar = document.getElementById('statusBar');
    bar.className = 'status-bar';
    bar.classList.remove('hidden');
    if (type === 'loading') {
      bar.classList.add('status-loading');
      bar.innerHTML = `<div class="spinner"></div><span>${msg}</span>`;
    } else if (type === 'success') {
      bar.classList.add('status-success');
      bar.innerHTML = `<span>✓</span><span>${msg}</span>`;
    } else {
      bar.classList.add('status-error');
      bar.innerHTML = `<span>✕</span><span>${msg}</span>`;
    }
  }

  function renderTable(chartNo, drugsArr) {
    document.getElementById('metaChart').textContent = chartNo;
    document.getElementById('metaCount').textContent = drugsArr.length + '개';
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = '';
    drugsArr.forEach((d, i) => addRowData(d, chartNo, i));
    updateJson(chartNo);
  }

  function addRowData(d, chartNo, i) {
    const tbody = document.getElementById('resultBody');
    const cn = chartNo || document.getElementById('chartNo').value.trim();
    const tr = document.createElement('tr');
    tr.dataset.idx = i;
    tr.innerHTML = `
      <td><span class="chart-tag">${cn}</span></td>
      <td><span class="code-badge">${d.drug_code || ''}</span></td>
      <td>${d.drug_name || ''}</td>
      <td class="editable-td"><input type="text" value="${d.dose ?? ''}" onchange="updateDrug(${i},'dose',this.value)"></td>
      <td class="editable-td"><input type="text" value="${d.daily_freq ?? ''}" onchange="updateDrug(${i},'daily_freq',this.value)"></td>
      <td class="editable-td"><input type="text" value="${d.days ?? ''}" onchange="updateDrug(${i},'days',this.value)"></td>
      <td><span class="method-badge">${d.method || ''}</span></td>
      <td><button class="icon-btn" onclick="deleteRow(this)" title="삭제">✕</button></td>
    `;
    tbody.appendChild(tr);
  }

  function addRow() {
    const cn = document.getElementById('chartNo').value.trim();
    const i = drugs.length;
    drugs.push({ drug_code: '', drug_name: '', dose: '', daily_freq: '', days: '', method: '' });
    addRowData(drugs[i], cn, i);
  }

  function deleteRow(btn) {
    const tr = btn.closest('tr');
    const idx = parseInt(tr.dataset.idx);
    drugs.splice(idx, 1);
    renderTable(document.getElementById('chartNo').value.trim(), drugs);
  }

  function updateDrug(i, field, val) {
    if (drugs[i]) drugs[i][field] = val;
    updateJson(document.getElementById('chartNo').value.trim());
  }

  function updateJson(chartNo) {
    const out = drugs.map(d => ({ chart_no: chartNo, ...d }));
    document.getElementById('jsonPreview').textContent = JSON.stringify(out, null, 2);
  }

  function switchTab(tab) {
    document.getElementById('tabTable').classList.toggle('active', tab === 'table');
    document.getElementById('tabJson').classList.toggle('active', tab === 'json');
    document.getElementById('tableView').classList.toggle('hidden', tab !== 'table');
    document.getElementById('jsonView').classList.toggle('hidden', tab !== 'json');
    if (tab === 'json') updateJson(document.getElementById('chartNo').value.trim());
  }

  async function saveToSheet() {
    if (!SHEET_WEBHOOK) {
      const bar = document.getElementById('saveResultBar');
      bar.className = 'save-result status-error';
      bar.classList.remove('hidden');
      bar.textContent = '⚠️ 구글시트 연동 URL이 아직 설정되지 않았습니다. 다음 단계에서 설정합니다.';
      return;
    }

    const chartNo = document.getElementById('chartNo').value.trim();
    const payload = drugs.map(d => ({ chart_no: chartNo, ...d }));
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중...';

    try {
      await fetch(SHEET_WEBHOOK, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const bar = document.getElementById('saveResultBar');
      bar.className = 'save-result status-success';
      bar.classList.remove('hidden');
      bar.textContent = `✓ ${payload.length}개 약물 데이터가 구글시트에 저장되었습니다.`;
    } catch (err) {
      const bar = document.getElementById('saveResultBar');
      bar.className = 'save-result status-error';
      bar.classList.remove('hidden');
      bar.textContent = '저장 실패: ' + err.message;
    } finally {
      saveBtn.disabled = false;
      saveBtn.innerHTML = '💾 구글시트에 저장';
    }
  }
</script>
</body>
</html>
